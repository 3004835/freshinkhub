<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verification - FreshInkHub</title>
  <meta name="description" content="Verification page for FreshInkHub users. Confirm age, identity, and access to premium content.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">FreshInkHub</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main style="padding: 50px; text-align:center;">
    <h1>Verify Your Account</h1>
    <p>We ensure that all users accessing FreshInkHub content are legitimate. Please confirm your age and agree to our terms to continue.</p>
    <form>
      <label for="age">Enter Your Age:</label><br>
      <input type="number" id="age" name="age" min="13" required><br><br>
      <input type="checkbox" id="agree" name="agree" required>
      <label for="agree">I confirm I am 13+ and agree to the Terms of Service</label><br><br>
      <button type="submit">Verify</button>
    </form>
  </main>

  <footer>
    <p>© 2026 FreshInkHub | <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a></p>
  </footer>
</body>
</html>
